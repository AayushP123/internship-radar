name: Internship Radar

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: internship-radar
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      PERSIST_ONLY_ON_CHANGE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check for new internships
        run: python monitor.py
      - name: Record poll in job summary
        if: always()
        run: |
          echo "### Internship Radar poll" >> "$GITHUB_STEP_SUMMARY"
          echo "- Completed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: $GITHUB_EVENT_NAME" >> "$GITHUB_STEP_SUMMARY"
      - name: Persist deduplication state
        run: |
          if git diff --quiet -- state.json; then
            exit 0
          fi
          git config user.name "internship-radar[bot]"
          git config user.email "internship-radar[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update internship radar state"
          git push
